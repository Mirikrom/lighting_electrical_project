<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Lustra & Lempala - Elektr narsalar{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        :root {
            --primary-color: #6366f1;
            --secondary-color: #8b5cf6;
            --accent-color: #f59e0b;
            --dark-color: #1e293b;
            --light-color: #f8fafc;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            margin: 0;
            padding: 0;
        }
        
        .main-container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            margin: 10px;
            padding: 15px;
            min-height: calc(100vh - 20px);
        }
        
        .card {
            border: none;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s, box-shadow 0.3s;
            overflow: hidden;
        }
        
        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.15);
        }
        
        .btn-primary {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            border: none;
            border-radius: 10px;
            padding: 10px 25px;
            font-weight: 600;
            transition: all 0.3s;
        }
        
        .btn-primary:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(99, 102, 241, 0.4);
        }
        
        .product-image {
            width: 100%;
            height: 250px;
            object-fit: cover;
            border-radius: 10px;
        }
        
        .price-badge {
            background: linear-gradient(135deg, var(--accent-color), #f97316);
            color: white;
            padding: 8px 15px;
            border-radius: 20px;
            font-weight: 700;
            font-size: 1.2rem;
        }
        
        .filter-section {
            background: var(--light-color);
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 30px;
        }
        
        .badge-stock {
            background: #10b981;
            color: white;
            padding: 5px 12px;
            border-radius: 15px;
            font-size: 0.85rem;
        }
        
        .badge-out-of-stock {
            background: #ef4444;
            color: white;
            padding: 5px 12px;
            border-radius: 15px;
            font-size: 0.85rem;
        }
        .navbar-store {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            border-radius: 12px;
            padding: 0.5rem 1rem;
            margin-bottom: 20px;
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.3);
        }
        .navbar-store .navbar-brand {
            color: white;
            font-weight: 700;
            font-size: 1.2rem;
        }
        .navbar-store .nav-link {
            color: rgba(255,255,255,0.9);
            font-weight: 500;
            padding: 0.5rem 0.75rem;
            border-radius: 8px;
            transition: background 0.2s, color 0.2s;
        }
        .navbar-store .nav-link:hover,
        .navbar-store .nav-link.active {
            color: white;
            background: rgba(255,255,255,0.2);
        }
        .navbar-store .nav-link.nav-link-add {
            background: rgba(255,255,255,0.95);
            color: var(--primary-color);
            font-weight: 600;
            border: 2px solid white;
            margin-left: 0.5rem;
        }
        .navbar-store .nav-link.nav-link-add:hover,
        .navbar-store .nav-link.nav-link-add.active {
            background: white;
            color: var(--secondary-color);
            border-color: white;
        }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>
    <div class="container-fluid">
        <div class="main-container">
            <nav class="navbar navbar-expand-lg navbar-store">
                <div class="container-fluid">
                    <a class="navbar-brand" href="{% url 'store:product_list' %}">
                        <i class="bi bi-shop"></i> Lustra & Lempala
                    </a>
                    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation" style="border-color: rgba(255,255,255,0.6);">
                        <span class="navbar-toggler-icon" style="filter: invert(1);"></span>
                    </button>
                    <div class="collapse navbar-collapse" id="navbarNav">
                        <ul class="navbar-nav me-auto">
                            <li class="nav-item">
                                <a class="nav-link {% if request.resolver_match.url_name == 'product_list' or request.resolver_match.url_name == 'create_sale' %}active{% endif %}" href="{% url 'store:product_list' %}">
                                    <i class="bi bi-cart-check"></i> Kassа
                                </a>
                            </li>
                            <li class="nav-item">
                                <a class="nav-link {% if request.resolver_match.url_name == 'product_list_old' %}active{% endif %}" href="{% url 'store:product_list_old' %}">
                                    <i class="bi bi-box-seam"></i> Mahsulotlar
                                </a>
                            </li>
                            <li class="nav-item">
                                <a class="nav-link {% if request.resolver_match.url_name == 'sale_list' or request.resolver_match.url_name == 'sale_detail' %}active{% endif %}" href="{% url 'store:sale_list' %}">
                                    <i class="bi bi-receipt"></i> Sotuvlar
                                </a>
                            </li>
                            <li class="nav-item">
                                <a class="nav-link {% if request.resolver_match.url_name == 'credit_list' %}active{% endif %}" href="{% url 'store:credit_list' %}">
                                    <i class="bi bi-credit-card"></i> Qarzdorlar
                                </a>
                            </li>
                        </ul>
                        <ul class="navbar-nav">
                            <li class="nav-item">
                                <a class="nav-link nav-link-add {% if request.resolver_match.url_name == 'create_product' %}active{% endif %}" href="{% url 'store:create_product' %}">
                                    <i class="bi bi-plus-circle"></i> Mahsulot qo'shish
                                </a>
                            </li>
                        </ul>
                    </div>
                </div>
            </nav>
            {% if messages %}
                {% for message in messages %}
                    <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
                        {{ message }}
                        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                    </div>
                {% endfor %}
            {% endif %}
            
            {% block content %}{% endblock %}
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
