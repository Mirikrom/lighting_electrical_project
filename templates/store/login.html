{% extends 'base.html' %}
{% block title %}Kirish — Lustra{% endblock %}
{% block navbar %}{% endblock %}
{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-5">
        <div class="card shadow">
            <div class="card-body p-4">
                <h4 class="card-title mb-4 text-center">Tizimga kirish</h4>
                {% if form.errors %}
                <div class="alert alert-danger">Login yoki parol noto‘g‘ri.</div>
                {% endif %}
                <form method="post" action="{% url 'store:login' %}">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label for="id_username" class="form-label">Login</label>
                        <input type="text" name="username" id="id_username" class="form-control" required autofocus>
                    </div>
                    <div class="mb-3">
                        <label for="id_password" class="form-label">Parol</label>
                        <input type="password" name="password" id="id_password" class="form-control" required>
                    </div>
                    <input type="hidden" name="next" value="{{ next }}">
                    <button type="submit" class="btn btn-primary w-100">Kirish</button>
                </form>
                <hr>
                <p class="text-center mb-0">
                    Hisobingiz yo‘qmi? <a href="{% url 'store:register' %}">Ro‘yxatdan o‘ting</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
